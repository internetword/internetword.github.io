<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="silly-story-generator.css">
    <title>Silly story generator</title>
</head>

<body>
    <div>
        <label for="customname">Enter custom name:</label>
        <input id="customname">
    </div>
    <div>
        <label for="us">US</label><input type="radio" id="us" name="ukus" value="us" checked>
        <label for="uk">UK</label><input type="radio" id="uk" name="ukus" value="uk">
    </div>
    <div>
        <button class="randomize">Generate random story</button>
    </div>
</body>

</html>
