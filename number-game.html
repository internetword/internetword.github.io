<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="number-game.css">
    <title>Number guessing</title>
</head>
<body>
    <h1>Number guessing game</h1>
    <p>We have selected a random number between 1 and 100. See if you can guess in 10 turns or less. We'll tell you if your guess was too high or too low.</p>
    <div>
        <label for="guessField">Enter a guess: </label> <input id="guessField">
        <input type="submit" class="guessSubmit">
    </div>
    <div class="resultParas">
        <p class="guesses"></p>
        <p class="lastResult"></p>
        <p class="lowOrHi"></p>
    </div>
    <script src="number-game.js"></script>
</body>
</html>
